name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: pakflood
          POSTGRES_PASSWORD: pakflood
          POSTGRES_DB: pakflood
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
        working-directory: .
      - name: Run pytest
        run: pytest app/tests/ -q --tb=short
        working-directory: backend
        env:
          DATABASE_URL: postgresql://pakflood:pakflood@localhost:5432/pakflood

  frontend:
    name: Frontend — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run vitest
        run: npm test
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend

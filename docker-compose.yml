services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: pakflood
      POSTGRES_PASSWORD: pakflood
      POSTGRES_DB: pakflood
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pakflood"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pakflood:pakflood@db:5432/pakflood
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
      # Mount the v3 training tree and real-data tree on top of /app so the
      # backend container can run the Gate B pipeline scripts and the contract
      # check directly. Relative paths inside the scripts resolve cleanly
      # because /app is also the container's WORKDIR.
      - ./ml:/app/ml
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
